<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Independent Brazil — Gerador de Assinatura</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
body { font-family:"DM Sans",sans-serif; background:#f0ede8; min-height:100vh; padding:0 0 60px; }
.top-bar { background:#fff; border-bottom:1px solid #e0ddd8; padding:18px 40px; display:flex; align-items:center; justify-content:center; gap:14px; }
.top-bar img { height:36px; object-fit:contain; }
.top-bar h1 { font-size:18px; font-weight:400; color:#111; }
.main { max-width:920px; margin:0 auto; padding:36px 20px 0; }
.card { background:#fff; border:1px solid #ddd; padding:28px; margin-bottom:24px; }
.card-title { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:2px; color:#111; margin-bottom:22px; padding-bottom:12px; border-bottom:1px solid #f0ede8; }
.form-grid { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
.field-full { grid-column:1/-1; }
.field label { display:block; font-size:10px; font-weight:600; text-transform:uppercase; letter-spacing:1px; color:#888; margin-bottom:5px; }
.field input { width:100%; padding:9px 12px; border:1px solid #ddd; font-family:"DM Sans",sans-serif; font-size:13px; color:#111; outline:none; transition:border-color .2s; }
.field input:focus { border-color:#111; }
.field input::placeholder { color:#bbb; }
.photo-area { display:flex; align-items:center; gap:16px; }
.photo-drop { width:58px; height:58px; border-radius:50%; border:2px dashed #ccc; cursor:pointer; display:flex; flex-direction:column; align-items:center; justify-content:center; background:#f8f8f8; transition:all .2s; overflow:hidden; flex-shrink:0; }
.photo-drop:hover { border-color:#111; }
.photo-drop img { width:100%; height:100%; object-fit:cover; border-radius:50%; display:none; }
.ph-icon { font-size:18px; color:#bbb; }
.ph-text { font-size:9px; color:#bbb; margin-top:2px; }
.photo-hint { font-size:11px; color:#999; line-height:1.6; }
#photoInput { display:none; }
.preview-label { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:2px; color:#111; margin-bottom:12px; }
.preview-wrap { border:1px solid #ddd; overflow:hidden; line-height:0; }
.preview-wrap canvas { display:block; width:100%; height:auto; }
.actions { display:flex; gap:10px; margin-top:18px; flex-wrap:wrap; }
.btn { padding:11px 22px; font-family:"DM Sans",sans-serif; font-size:11px; font-weight:700; letter-spacing:.8px; text-transform:uppercase; cursor:pointer; border:none; transition:all .2s; display:flex; align-items:center; gap:6px; }
.btn-primary  { background:#111; color:#fff; }  .btn-primary:hover  { background:#333; }
.btn-outline  { background:transparent; color:#111; border:1.5px solid #111; } .btn-outline:hover { background:#111; color:#fff; }
.btn-drive    { background:#1a73e8; color:#fff; } .btn-drive:hover { background:#1557b0; }
.notif { position:fixed; bottom:24px; right:24px; background:#111; color:#fff; padding:12px 18px; font-size:12px; font-weight:500; max-width:300px; transform:translateY(70px); opacity:0; transition:all .3s ease; pointer-events:none; z-index:999; }
.notif.show { transform:translateY(0); opacity:1; }
.notif a { color:#7eb3ff; text-decoration:none; }
@media(max-width:600px) { .form-grid{grid-template-columns:1fr;} .top-bar{padding:14px 16px;} .card{padding:18px;} }

/* ── CROPPER MODAL ─────────────────────────────────────── */
.cropper-overlay {
  display:none; position:fixed; inset:0;
  background:rgba(0,0,0,0.75); z-index:1000;
  align-items:center; justify-content:center;
}
.cropper-overlay.open { display:flex; }
.cropper-box {
  background:#fff; padding:24px; width:360px;
  display:flex; flex-direction:column; gap:16px;
}
.cropper-box h3 { font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:1.5px; color:#111; }
.cropper-stage {
  position:relative; width:310px; height:310px;
  overflow:hidden; background:#222; margin:0 auto; cursor:grab;
}
.cropper-stage:active { cursor:grabbing; }
.cropper-stage canvas { position:absolute; top:0; left:0; }
/* Circle overlay guide */
.cropper-guide {
  position:absolute; inset:0; pointer-events:none;
  background: radial-gradient(circle 145px at 50% 50%, transparent 145px, rgba(0,0,0,0.55) 146px);
}
.cropper-controls { display:flex; flex-direction:column; gap:8px; }
.cropper-controls label { font-size:10px; font-weight:600; text-transform:uppercase; letter-spacing:1px; color:#888; }
.cropper-controls input[type=range] { width:100%; accent-color:#111; }
.cropper-actions { display:flex; gap:10px; }
.cropper-actions button { flex:1; padding:10px; font-family:"DM Sans",sans-serif; font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.8px; cursor:pointer; border:none; }
.btn-crop-confirm { background:#111; color:#fff; }
.btn-crop-cancel  { background:transparent; color:#111; border:1.5px solid #ccc; }
</style>
</head>

var photoDataUrl=null, photoImg=null;
var logoImg=new Image(), wmImg=new Image();
logoImg.onload=function(){renderSig();};
wmImg.onload=function(){renderSig();};
logoImg.src=LOGO_SRC; wmImg.src=WM_SRC;

// ── CROPPER STATE ──────────────────────────────────────────
var cropRawImg=null, cropZoom=1, cropRotate=0;
var cropOffX=0, cropOffY=0;
var cropDrag=false, cropLastX=0, cropLastY=0;
var CROP_SIZE=310, CROP_R=145;

function handlePhoto(input){
  var file=input.files[0]; if(!file) return;
  var r=new FileReader();
  r.onload=function(e){
    cropRawImg=new Image();
    cropRawImg.onload=function(){
      // Reset crop state — fit image to fill circle
      cropZoom=1; cropRotate=0;
      var fit=Math.max(CROP_SIZE/cropRawImg.width, CROP_SIZE/cropRawImg.height);
      cropZoom=fit;
      cropOffX=0; cropOffY=0;
      document.getElementById("cropZoom").value=cropZoom;
      document.getElementById("cropRotate").value=0;
      document.getElementById("cropperOverlay").classList.add("open");
      drawCrop();
    };
    cropRawImg.src=e.target.result;
  };
  r.readAsDataURL(file);
}

function drawCrop(){
  var canvas=document.getElementById("cropCanvas");
  var ctx=canvas.getContext("2d");
  ctx.clearRect(0,0,CROP_SIZE,CROP_SIZE);
  ctx.save();
  ctx.translate(CROP_SIZE/2 + cropOffX, CROP_SIZE/2 + cropOffY);
  ctx.rotate(cropRotate * Math.PI/180);
  ctx.scale(cropZoom, cropZoom);
  ctx.drawImage(cropRawImg, -cropRawImg.width/2, -cropRawImg.height/2);
  ctx.restore();
}

function closeCropper(){
  document.getElementById("cropperOverlay").classList.remove("open");
}

function confirmCrop(){
  // Extract circle region as square
  var canvas=document.getElementById("cropCanvas");
  var out=document.createElement("canvas");
  out.width=out.height=CROP_R*2;
  var ctx=out.getContext("2d");
  ctx.beginPath();
  ctx.arc(CROP_R,CROP_R,CROP_R,0,Math.PI*2);
  ctx.clip();
  ctx.drawImage(canvas, CROP_SIZE/2-CROP_R, CROP_SIZE/2-CROP_R, CROP_R*2, CROP_R*2, 0, 0, CROP_R*2, CROP_R*2);
  photoDataUrl=out.toDataURL("image/png");
  photoImg=new Image();
  photoImg.onload=function(){renderSig();};
  photoImg.src=photoDataUrl;
  // Update thumbnail
  var ci=document.getElementById("photoPreviewCircle");
  ci.src=photoDataUrl; ci.style.display="block";
  document.getElementById("phIcon").style.display="none";
  document.getElementById("phText").style.display="none";
  document.getElementById("photoDrop").style.border="2px solid #111";
  closeCropper();
}

// Drag to reposition
document.addEventListener("DOMContentLoaded",function(){
  var stage=document.getElementById("cropStage");
  stage.addEventListener("mousedown",function(e){
    cropDrag=true; cropLastX=e.clientX; cropLastY=e.clientY; e.preventDefault();
  });
  document.addEventListener("mousemove",function(e){
    if(!cropDrag) return;
    cropOffX += e.clientX-cropLastX;
    cropOffY += e.clientY-cropLastY;
    cropLastX=e.clientX; cropLastY=e.clientY;
    drawCrop();
  });
  document.addEventListener("mouseup",function(){cropDrag=false;});
  // Touch
  stage.addEventListener("touchstart",function(e){
    cropDrag=true; cropLastX=e.touches[0].clientX; cropLastY=e.touches[0].clientY;
  });
  stage.addEventListener("touchmove",function(e){
    if(!cropDrag) return;
    cropOffX += e.touches[0].clientX-cropLastX;
    cropOffY += e.touches[0].clientY-cropLastY;
    cropLastX=e.touches[0].clientX; cropLastY=e.touches[0].clientY;
    drawCrop(); e.preventDefault();
  },{passive:false});
  stage.addEventListener("touchend",function(){cropDrag=false;});
  // Sliders
  document.getElementById("cropZoom").addEventListener("input",function(){
    cropZoom=parseFloat(this.value); drawCrop();
  });
  document.getElementById("cropRotate").addEventListener("input",function(){
    cropRotate=parseFloat(this.value); drawCrop();
  });
  // Scroll to zoom
  stage.addEventListener("wheel",function(e){
    cropZoom=Math.max(0.5,Math.min(3,cropZoom-(e.deltaY*0.001)));
    document.getElementById("cropZoom").value=cropZoom;
    drawCrop(); e.preventDefault();
  },{passive:false});
});

function drawIcon(ctx,type,cx,cy,size){
  var r=size/2;
  ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2);
  ctx.fillStyle="#000"; ctx.fill();
  var path=new Path2D(IPATH[type]);
  var sc=size*0.62/24;
  ctx.save();
  ctx.translate(cx-24*sc/2, cy-24*sc/2);
  ctx.scale(sc,sc);
  ctx.fillStyle="#fff"; ctx.fill(path);
  ctx.restore();
}

function renderSig(){
  var nome  =document.getElementById("fNome").value.trim()  ||"Nome do Colaborador";
  var funcao=document.getElementById("fFuncao").value.trim()||"Cargo / Função";
  var tel   =document.getElementById("fTel").value.trim();
  var cel   =document.getElementById("fCel").value.trim();
  var email =document.getElementById("fEmail").value.trim();
  var fax   =document.getElementById("fFax").value.trim();
  var site  =document.getElementById("fSite").value.trim();

  var contacts=[];
  if(tel)  contacts.push({t:"phone",v:tel});
  if(cel)  contacts.push({t:"phone",v:cel});
  if(email)contacts.push({t:"email",v:email});
  if(fax)  contacts.push({t:"phone",v:fax});
  if(site) contacts.push({t:"web",  v:site});

  var canvas=document.getElementById("sigCanvas");
  canvas.width=CW; canvas.height=CH;
  var ctx=canvas.getContext("2d");

  // ── BACKGROUND ──────────────────────────────────────────────
  ctx.fillStyle="#ffffff";
  ctx.fillRect(0,0,CW,CH);

  // ── WATERMARK "INDEPENDENT BRAZIL" ──────────────────────────
  if(wmImg.complete && wmImg.naturalWidth){
    ctx.save();
    ctx.globalAlpha=0.45;
    ctx.drawImage(wmImg,0,0,CW,CH);
    ctx.restore();
  }

  // ── BLOCO 1: FOTO ───────────────────────────────────────────
  ctx.save();
  ctx.beginPath();
  ctx.arc(PHOTO_CX,PHOTO_CY,PHOTO_R,0,Math.PI*2);
  ctx.clip();
  if(photoImg && photoImg.complete && photoImg.naturalWidth){
    ctx.drawImage(photoImg,PHOTO_CX-PHOTO_R,PHOTO_CY-PHOTO_R,PHOTO_D,PHOTO_D);
  } else {
    ctx.fillStyle="#c8c8c8";
    ctx.fillRect(PHOTO_CX-PHOTO_R,PHOTO_CY-PHOTO_R,PHOTO_D,PHOTO_D);
    // Silhouette
    ctx.fillStyle="#a0a0a0";
    ctx.beginPath(); ctx.arc(PHOTO_CX,PHOTO_CY-18,22,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(PHOTO_CX,PHOTO_CY+40,38,0,Math.PI,true); ctx.fill();
  }
  ctx.restore();
  // Border ring
  ctx.beginPath(); ctx.arc(PHOTO_CX,PHOTO_CY,PHOTO_R,0,Math.PI*2);
  ctx.strokeStyle="#000"; ctx.lineWidth=PHOTO_BRD; ctx.stroke();

  // ── BLOCO 2: DADOS ──────────────────────────────────────────
  ctx.textBaseline="alphabetic";

  // Nome
  ctx.font="400 "+NAME_SZ+"px Helvetica,Arial,sans-serif";
  ctx.fillStyle="#000";
  ctx.fillText(nome, DATA_X, NAME_Y);

  // Cargo
  ctx.font="400 "+CARGO_SZ+"px Helvetica,Arial,sans-serif";
  ctx.fillStyle="#444";
  ctx.fillText(funcao, DATA_X, CARGO_Y);

  // Divisória
  ctx.fillStyle="#000";
  ctx.fillRect(DATA_X, DIV_Y, 60, 3);

  // Contatos
  ctx.font="400 12px Helvetica,Arial,sans-serif";
  ctx.textBaseline="middle";
  // Vertical connecting line between icons
  if(contacts.length > 1){
    var lineX = CT_X + ICON_SZ/2;
    var lineY1 = CT_Y0;
    var lineY2 = CT_Y0 + (contacts.length-1)*CT_LH;
    ctx.beginPath();
    ctx.moveTo(lineX, lineY1);
    ctx.lineTo(lineX, lineY2);
    ctx.strokeStyle="#000";
    ctx.lineWidth=1.5;
    ctx.stroke();
  }
  for(var i=0;i<contacts.length;i++){
    var c=contacts[i];
    var icy=CT_Y0+i*CT_LH;
    drawIcon(ctx,c.t, CT_X+ICON_SZ/2, icy, ICON_SZ);
    ctx.fillStyle="#333";
    ctx.fillText(c.v, CT_X+ICON_SZ+10, icy);
  }

  // ── BLOCO 3: LOGO + FRASE ───────────────────────────────────
  if(logoImg.complete && logoImg.naturalWidth){
    ctx.drawImage(logoImg, LOGO_X, LOGO_Y, LOGO_W, LOGO_H);
  }

  ctx.font="500 "+FRASE_SZ+"px Helvetica,Arial,sans-serif";
  ctx.fillStyle="#000";
  ctx.textBaseline="alphabetic";
  var flines=["We","connect","people,","we connect","business."];
  for(var i=0;i<flines.length;i++){
    ctx.fillText(flines[i], FRASE_X, FRASE_Y+i*FRASE_LH);
  }
}

function downloadPNG(){

}

function copyHtml(){
  var nome  =document.getElementById("fNome").value.trim()  ||"Nome";
  var funcao=document.getElementById("fFuncao").value.trim()||"Cargo";
  var tel   =document.getElementById("fTel").value.trim();
  var cel   =document.getElementById("fCel").value.trim();
  var email =document.getElementById("fEmail").value.trim();
  var fax   =document.getElementById("fFax").value.trim();
  var site  =document.getElementById("fSite").value.trim();
  var contacts=[];
  if(tel)  contacts.push({t:"phone",v:tel});
  if(cel)  contacts.push({t:"phone",v:cel});
  if(email)contacts.push({t:"email",v:email});
  if(fax)  contacts.push({t:"phone",v:fax});
  if(site) contacts.push({t:"web",  v:site});

  // Icon as inline SVG data URI (works in Gmail)
  function iconSvg(type){
    var p=IPATH[type];
    var svg='<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="11" height="11"><circle cx="12" cy="12" r="12" fill="#000"/><path d="'+p+'" fill="#fff"/></svg>';
    return 'data:image/svg+xml;base64,'+btoa(svg);
  }

  var ctRows='';
  for(var i=0;i<contacts.length;i++){
    var c2=contacts[i];
    var isLast=(i===contacts.length-1);
    ctRows+='<tr>'
      +'<td align="center" style="width:20px;vertical-align:middle;padding-right:8px;">'
      +'<img src="'+iconSvg(c2.t)+'" width="18" height="18" style="display:block;border-radius:50%;">'
      +(!isLast?'<div style="width:1px;height:8px;background:#000;margin:0 auto;"></div>':'')
      +'</td>'
      +'<td style="font-family:Helvetica,Arial,sans-serif;font-size:13px;color:#333;white-space:nowrap;padding:2px 0;">'+c2.v+'</td>'
      +'</tr>';
  }

  var photoCell = photoDataUrl
    ? '<img src="'+photoDataUrl+'" width="111" height="111" style="border-radius:50%;border:4px solid #000;display:block;">'
    : '<div style="width:111px;height:111px;border-radius:50%;background:#d0d0d0;border:4px solid #000;"></div>';

  var html=
    '<table cellpadding="0" cellspacing="0" border="0" style="border-collapse:collapse;background:#ffffff;font-family:Helvetica,Arial,sans-serif;">'
    +'<tr valign="middle">'
    +'<td style="padding:15px 20px 15px 15px;">'+photoCell+'</td>'
    +'<td style="padding:15px 30px 15px 0;vertical-align:top;">'
      +'<div style="font-size:16px;font-weight:400;color:#000;margin-bottom:3px;">'+nome+'</div>'
      +'<div style="font-size:12px;color:#444;margin-bottom:8px;">'+funcao+'</div>'
      +'<div style="width:50px;height:2px;background:#000;margin-bottom:10px;"></div>'
      +'<table cellpadding="0" cellspacing="0" border="0">'+ctRows+'</table>'
    +'</td>'
    +'<td style="padding:15px 30px 15px 0;vertical-align:middle;">'
      +'<img src="'+LOGO_SRC+'" width="76" height="76" style="display:block;">'
    +'</td>'
    +'<td style="padding:15px 15px 15px 0;vertical-align:middle;">'
      +'<div style="font-family:Helvetica,Arial,sans-serif;font-size:20px;font-weight:400;color:#000;line-height:1.15;max-width:200px;">'
      +'We<br>connect<br>people,<br>we connect<br>business.'
      +'</div>'
    +'</td>'
    +'</tr>'
    +'</table>';

  navigator.clipboard.writeText(html)
    .then(function(){showNotif("HTML copiado! No Gmail: Configurações → Ver todas → Assinatura → Nova → Cole com Ctrl+V");})
    .catch(function(){
      var t=document.createElement("textarea");
      t.value=html;document.body.appendChild(t);t.select();
      document.execCommand("copy");document.body.removeChild(t);
      showNotif("HTML copiado!");
    });
}

function showNotif(msg){
  var n=document.getElementById("notif");
  n.innerHTML=msg; n.classList.add("show");
  clearTimeout(window._nt);
  window._nt=setTimeout(function(){n.classList.remove("show");},5500);
}
